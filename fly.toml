app = "rialu"
primary_region = "lhr"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = "rialu_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# ── Scheduled jobs ────────────────────────────────────────────────────────────
# Weekly portfolio divergence digest. Fly.toml has no native cron field, so the
# scheduled machine is created out-of-band (once). The rialu_data volume is
# SINGLE-ATTACH (already held by the app machine), so the scheduled machine
# cannot run the digest in-process — instead it POSTs to the app's public edge,
# which auto-starts the app machine that owns the volume:
#
#   fly machine run registry.fly.io/rialu:<current-deploy-tag> \
#     --app rialu \
#     --region lhr \
#     --schedule weekly \
#     --restart no \
#     python scripts/divergence_selfcall.py
#
# (Use the image tag from `fly status`/`fly machines list`.) The script targets
# rialu.fly.dev with a `Host: rialu.ie` header (clears CanonicalHostMiddleware)
# and a Bearer FAIRE_WS_TOKEN (app secret, inherited). The digest is idempotent,
# so Fly's coarse "weekly" cadence (~Mon 00:00 UTC) and DST drift are harmless.
